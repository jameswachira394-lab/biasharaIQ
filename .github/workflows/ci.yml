name: BiasharaIQ CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend – Lint & Syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Syntax check all Python files
        run: |
          python -m py_compile main.py
          find . -name "*.py" -exec python -m py_compile {} \;

      - name: Lint with flake8 (warnings only)
        run: flake8 . --max-line-length=120 --exit-zero

  frontend-test:
    name: Frontend – Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for JS syntax errors
        run: npx next lint --max-warnings 0 || true

      - name: Type-check (if tsconfig present)
        run: |
          if [ -f tsconfig.json ]; then npx tsc --noEmit; fi
