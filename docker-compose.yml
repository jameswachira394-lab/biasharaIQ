version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: biasharaiq_db
    environment:
      POSTGRES_DB: biasharaiq
      POSTGRES_USER: biasharaiq
      POSTGRES_PASSWORD: biasharaiq_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U biasharaiq" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biasharaiq_api
    environment:
      DATABASE_URL: postgresql://biasharaiq_user:HNGUx7rn1527Utk6SAFtEffp7tUrI85z@dpg-d7p4gi5ckfvc73f23k20-a.oregon-postgres.render.com/biasharaiq
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-32chars-min}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${SECRET_KEY:-change-me-in-production-32chars-min}
      CORS_ORIGINS: htps://biashara-iq.vercel.app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://biasharaiq.onrender.com
    container_name: biasharaiq_web
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
