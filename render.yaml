services:
  - type: web
    name: biasharaiq-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app --workers=4 --worker-class=uvicorn.workers.UvicornWorker --bind=0.0.0.0:$PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: biasharaiq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://biashara-iq.vercel.app,https://biasharaiq.onrender.com
      - key: FRONTEND_URL
        value: https://biashara-iq.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: DB_POOL_SIZE
        value: "25"
      - key: DB_MAX_OVERFLOW
        value: "15"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_PASSKEY
        value: bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919
      - key: MPESA_CALLBACK_URL
        value: https://biasharaiq.onrender.com/payments/callback
      - key: MPESA_ENVIRONMENT
        value: sandbox

databases:
  - name: biasharaiq-db
    databaseName: biasharaiq
    user: biasharaiq
    plan: free
    region: frankfurt
