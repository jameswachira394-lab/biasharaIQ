services:
  - type: web
    name: biasharaiq-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers=4 --worker-class=uvicorn.workers.UvicornWorker --bind=0.0.0.0:$PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: biasharaiq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://biashara-f43hbl3il-veritys-projects-965ff306.vercel.app,https://biasharaiq.onrender.com
      - key: FRONTEND_URL
        value: https://biashara-f43hbl3il-veritys-projects-965ff306.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: DB_POOL_SIZE
        value: "25"
      - key: DB_MAX_OVERFLOW
        value: "15"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: biasharaiq-db
    databaseName: biasharaiq
    user: biasharaiq
    plan: free
    region: frankfurt
