services:
  - type: web
    name: biasharaiq-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: biasharaiq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app

databases:
  - name: biasharaiq-db
    databaseName: biasharaiq
    user: biasharaiq
    plan: free
    region: frankfurt
